<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css" />
    <title> I'm asking you out </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
     <div id="ayran-container">
        <img src="ayranIdle.gif" class ="start-screen" alt="ayranIdle" />
        <div class="buttons" id="askout-buttons"></div>
        <h1> for ceyda </h1>
     </div>
      <div id="askout-container">
        <div class="askout-window">
            <div class="window-content">
                <h1 id="askout-title" class="askout-title">Please go out with me?</h1>
                
                <div class="main-display">
                    <div class="left-cat">
                        <img src="strawberries.png" class="strawberries" alt="strawberries" />
                        <img src="cicacat.gif" class="cat" id="askoutcat2" />
                    </div>
                    <div class="right-cat">
                        <img src="ayran.png" class="ayran" alt="ayran" />
                        <img src="ayrancat.gif" class="cat" id="askoutcat1" />
                    </div>
                </div>

                <div class="buttons" id="askout-buttons">
                    <img src="yes.png" class="btn yes-btn" alt="Yes" />
                    <div class="no-wrapper">
                        <img src="no.png" class="btn no-btn" alt="No" />
                    </div>
                </div>
                <div id="final-container">
                <p id="final-text" class="final-text" style="display: none">
                    <strong>How about next Sunday?</strong>
                </p>
                <div class="catPicknick" id="catPicknick">
                    <img src="catPicknick.gif" class="cat" alt="catPicknick" />
                </div>
                </div>
            </div>
        </div>
      </div>
    <script src="script.js"></script>
</body>
</html>
